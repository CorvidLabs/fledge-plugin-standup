[plugin]
name = "fledge-plugin-standup"
version = "0.2.0"
description = "Markdown standup summary from your recent git commits, narrated by the active LLM."
author = "0xLeif"
license = "MIT"

[[commands]]
name = "standup"
description = "Generate a Markdown standup post from recent git activity"
binary = "bin/standup"

[capabilities]
exec = false
store = false
metadata = false
