[plugin]
name = "fledge-plugin-standup"
version = "0.3.0"
description = "Markdown standup summary from your recent git commits, narrated by the active LLM. Built in Rust."
author = "0xLeif"
license = "MIT"

[[commands]]
name = "standup"
description = "Generate a Markdown standup post from recent git activity"
binary = "target/release/fledge-standup"

[capabilities]
exec = false
store = false
metadata = false
